<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditya Times — Today's Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+Devanagari:wght@600;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F5F0;
    --ink: #141312;
    --ink-soft: #4A463D;
    --red: #D3242A;
    --red-dark: #A81B20;
    --rule: rgba(20,19,18,0.15);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #EDEAE2;
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  /* ---------- Masthead ---------- */
  .masthead {
    background: var(--paper);
    padding-top: 1.3rem;
  }

  .contact-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.02em;
    padding: 0 0.3rem 1rem;
  }

  .contact-row span { display: flex; align-items: center; gap: 6px; }
  .contact-row svg { flex-shrink: 0; }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 0.3rem;
  }

  .brand-logo {
    height: 150px;
    width: auto;
    display: block;
  }

  .paper-name {
    text-align: center;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-weight: 800;
    font-size: clamp(1.8rem, 5.5vw, 2.6rem);
    color: var(--red);
    margin: 0.4rem 0 0;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  .title-rule {
    height: 5px;
    background: var(--ink);
    margin: 0.6rem 0 0.8rem;
  }

  .checker {
    height: 22px;
    background: repeating-linear-gradient(
      90deg,
      var(--red) 0px, var(--red) 38px,
      var(--ink) 38px, var(--ink) 76px
    );
    margin-bottom: 1.2rem;
  }

  .util-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-bottom: 1rem;
  }

  .lang-toggle {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: none;
  }
  .lang-toggle:hover { background: var(--red); }

  /* ---------- Edition sheet ---------- */
  .sheet-wrap {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 10px;
  }

  .viewer {
    width: 100%;
    height: 80vh;
    min-height: 460px;
    border: none;
    background: #fff;
    display: block;
  }

  .empty-state {
    height: 80vh;
    min-height: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0.6rem;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    padding: 1rem;
  }

  .empty-state h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    margin: 0;
  }

  .empty-state p { font-size: 13px; margin: 0; max-width: 360px; line-height: 1.6; }

  .footer-row {
    margin-top: 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .publisher-link {
    background: none;
    border: none;
    color: var(--ink-soft);
    text-decoration: underline;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    padding: 0;
  }
  .publisher-link:hover { color: var(--red); }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,19,18,0.55);
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--paper);
    border: 1px solid var(--rule);
    max-width: 380px;
    width: 100%;
    padding: 1.6rem;
    font-family: 'Inter', sans-serif;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    margin: 0 0 0.9rem;
    font-size: 1.2rem;
    color: var(--red);
  }

  .modal label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.3rem;
    margin-top: 0.9rem;
  }

  .modal input {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--rule);
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink);
  }
  .modal input:focus { outline: 2px solid var(--red); outline-offset: 1px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 1.3rem;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.03em;
    padding: 9px 16px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
  }
  .btn:hover { background: var(--red); border-color: var(--red); }
  .btn:disabled { opacity: 0.5; cursor: default; }

  .btn-ghost {
    background: none;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover { background: #EDEAE2; color: var(--ink); }

  .error-msg {
    color: var(--red);
    font-size: 12px;
    margin-top: 0.6rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .modal-hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 1rem;
    line-height: 1.5;
  }
</style>
</head>

    <h1 class="paper-name hi" id="paperName" style="display:none;">आदित्य टाइम्स</h1>
    <div class="title-rule"></div>
    <div class="checker"></div>

    <div class="util-row">
      <span id="dateLabel"></span>
      <button class="lang-toggle" id="langToggle">हिंदी</button>
    </div>
  </div>

  <div class="sheet-wrap">
    <div id="viewerHolder">
      <div class="empty-state" id="emptyState">
        <h2 id="emptyTitle">Loading today's paper…</h2>
        <p></p>
      </div>
    </div>
  </div>

  <div class="footer-row">
    <span class="updated-note" id="updatedNote"></span>
    <button class="publisher-link" id="openPublisher">Publisher access</button>
  </div>

</div>

<div class="modal-backdrop" id="publishModal">
  <div class="modal">
    <h3 id="modalTitle">Publish today's edition</h3>
    <label id="pwLabel" for="pwInput">Password</label>
    <input type="password" id="pwInput" autocomplete="off">
    <label id="urlLabel" for="urlInput">PDF link (Google Drive, Dropbox, or direct URL)</label>
    <input type="text" id="urlInput">
    <div class="error-msg" id="formError"></div>
    <div class="modal-actions">
      <button class="btn" id="publishBtn">Publish</button>
      <button class="btn btn-ghost" id="publishCancel">Close</button>
    </div>
    <p class="modal-hint" id="modalHint"></p>
  </div>
</div>

<script>
  /* Point this at your deployed Cloudflare Worker URL — see worker.js / wrangler.toml */
  const WORKER_URL = "https://enewspaper-backend.cake01433.workers.dev";

  const T = {
    en: {
      paperName: "ADITYA TIMES", paperNameClass: "",
      dailyLine: "Daily digital edition",
      emptyTitle: "No edition published yet",
      emptyText: "Check back shortly — the publisher hasn't uploaded today's paper.",
      loadError: "Couldn't reach the server. Check back shortly.",
      publisherLink: "Publisher access",
      modalTitle: "Publish today's edition",
      pwLabel: "Password", pwPlaceholder: "Enter password",
      urlLabel: "PDF link (Google Drive, Dropbox, or direct URL)",
      urlPlaceholder: "https://drive.google.com/file/d/.../view",
      publishBtn: "Publish", closeBtn: "Close",
      hint: "Google Drive: right-click the PDF → Share → set to \"Anyone with the link\", then paste that link here. The password is checked on the server — it's never stored in this page.",
      enterPw: "Enter the password.", pasteLink: "Paste a PDF link.",
      publishing: "Publishing…", lastUpdated: "Last updated",
      genericError: "Something went wrong.", connError: "Couldn't reach the server. Try again.",
      toggleLabel: "हिंदी", locale: "en-US"
    },
    hi: {
      paperName: "आदित्य टाइम्स", paperNameClass: "hi",
      dailyLine: "दैनिक डिजिटल संस्करण",
      emptyTitle: "आज का अंक अभी प्रकाशित नहीं हुआ",
      emptyText: "कृपया थोड़ी देर बाद देखें — प्रकाशक ने अभी तक आज का अखबार अपलोड नहीं किया है।",
      loadError: "सर्वर से संपर्क नहीं हो सका। कृपया थोड़ी देर बाद देखें।",
      publisherLink: "प्रकाशक पहुँच",
      modalTitle: "आज का अंक प्रकाशित करें",
      pwLabel: "पासवर्ड", pwPlaceholder: "पासवर्ड दर्ज करें",
      urlLabel: "PDF लिंक (Google Drive, Dropbox, या सीधा URL)",
      urlPlaceholder: "https://drive.google.com/file/d/.../view",
      publishBtn: "प्रकाशित करें", closeBtn: "बंद करें",
      hint: "Google Drive: PDF पर राइट-क्लिक करें → Share → \"Anyone with the link\" चुनें, फिर वह लिंक यहाँ पेस्ट करें। पासवर्ड सर्वर पर जाँचा जाता है — यह कभी भी इस पेज में सेव नहीं होता।",
      enterPw: "पासवर्ड दर्ज करें।", pasteLink: "PDF लिंक पेस्ट करें।",
      publishing: "प्रकाशित हो रहा है…", lastUpdated: "अंतिम अद्यतन",
      genericError: "कुछ गलत हो गया।", connError: "सर्वर से संपर्क नहीं हो सका। पुनः प्रयास करें।",
      toggleLabel: "English", locale: "hi-IN"
    }
  };

  let lang = "en";
  let lastRecord = null; // remember current edition so re-render on language switch keeps it

  const el = (id) => document.getElementById(id);

  function applyLanguage() {
    const t = T[lang];
    if (lang === 'hi') {
      el('paperName').style.display = 'block';
      el('paperName').textContent = t.paperName;
    } else {
      el('paperName').style.display = 'none';
    }
    el('openPublisher').textContent = t.publisherLink;
    el('modalTitle').textContent = t.modalTitle;
    el('pwLabel').textContent = t.pwLabel;
    el('pwInput').placeholder = t.pwPlaceholder;
    el('urlLabel').textContent = t.urlLabel;
    el('urlInput').placeholder = t.urlPlaceholder;
    el('publishBtn').textContent = t.publishBtn;
    el('publishCancel').textContent = t.closeBtn;
    el('modalHint').textContent = t.hint;
    el('langToggle').textContent = t.toggleLabel;
    document.title = t.paperName + " — " + t.dailyLine;

    const today = new Date();
    el('dateLabel').textContent = today.toLocaleDateString(t.locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    if (lastRecord && lastRecord.url) {
      el('updatedNote').textContent = `${t.lastUpdated} ${new Date(lastRecord.updatedAt).toLocaleString(t.locale)}`;
    } else {
      renderEmpty();
    }
  }

  function toEmbedUrl(url) {
    url = url.trim();
    const driveMatch = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
    if (driveMatch) return `https://drive.google.com/file/d/${driveMatch[1]}/preview`;
    const driveOpen = url.match(/drive\.google\.com\/open\?id=([^&]+)/);
    if (driveOpen) return `https://drive.google.com/file/d/${driveOpen[1]}/preview`;
    if (url.includes('dropbox.com')) {
      return url.replace('?dl=0', '?raw=1').replace('&dl=0', '&raw=1');
    }
    return url;
  }

  function renderPdf(url) {
    document.getElementById('viewerHolder').innerHTML = `<iframe class="viewer" src="${toEmbedUrl(url)}" title="Today's newspaper PDF"></iframe>`;
  }

  function renderEmpty() {
    const t = T[lang];
    document.getElementById('viewerHolder').innerHTML = `
      <div class="empty-state">
        <h2>${t.emptyTitle}</h2>
        <p>${t.emptyText}</p>
      </div>`;
  }

  async function loadEdition() {
    try {
      const res = await fetch(`${WORKER_URL}/api/edition`);
      const data = await res.json();
      if (data && data.url) {
        lastRecord = data;
        renderPdf(data.url);
        el('updatedNote').textContent = `${T[lang].lastUpdated} ${new Date(data.updatedAt).toLocaleString(T[lang].locale)}`;
      } else {
        renderEmpty();
      }
    } catch (e) {
      const t = T[lang];
      document.getElementById('viewerHolder').innerHTML = `
        <div class="empty-state"><h2>${t.emptyTitle}</h2><p>${t.loadError}</p></div>`;
    }
  }

  el('langToggle').addEventListener('click', () => {
    lang = lang === "en" ? "hi" : "en";
    applyLanguage();
  });

  applyLanguage();
  loadEdition();

  /* ---------- Publisher flow ---------- */
  const publishModal = el('publishModal');
  const pwInput = el('pwInput');
  const urlInput = el('urlInput');
  const formError = el('formError');
  const publishBtn = el('publishBtn');

  el('openPublisher').addEventListener('click', () => {
    pwInput.value = ''; urlInput.value = '';
    formError.classList.remove('show');
    publishModal.classList.add('open');
    pwInput.focus();
  });

  el('publishCancel').addEventListener('click', () => publishModal.classList.remove('open'));

  publishBtn.addEventListener('click', async () => {
    const t = T[lang];
    const password = pwInput.value;
    const pdfUrl = urlInput.value.trim();
    formError.classList.remove('show');

    if (!password) { formError.textContent = t.enterPw; formError.classList.add('show'); return; }
    if (!pdfUrl) { formError.textContent = t.pasteLink; formError.classList.add('show'); return; }

    publishBtn.disabled = true;
    publishBtn.textContent = t.publishing;

    try {
      const res = await fetch(`${WORKER_URL}/api/publish`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password, pdfUrl }),
      });
      const data = await res.json();

      if (!res.ok) {
        formError.textContent = data.error || t.genericError;
        formError.classList.add('show');
      } else {
        lastRecord = data.record;
        renderPdf(data.record.url);
        el('updatedNote').textContent = `${t.lastUpdated} ${new Date(data.record.updatedAt).toLocaleString(t.locale)}`;
        publishModal.classList.remove('open');
      }
    } catch (e) {
      formError.textContent = t.connError;
      formError.classList.add('show');
    } finally {
      publishBtn.disabled = false;
      publishBtn.textContent = t.publishBtn;
    }
  });

  publishModal.addEventListener('click', (e) => { if (e.target === publishModal) publishModal.classList.remove('open'); });
</script>

</body>
</html>
